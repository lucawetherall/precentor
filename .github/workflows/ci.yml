name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-for-ci

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    # Run inside the official Playwright image: the browsers (and their system
    # libraries) are baked in, so we never hit the CDN browser download that
    # repeatedly stalled this job. Pin the tag to the installed
    # @playwright/test version so the bundled browser revision matches.
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    # Safety net so a hung server/test fails fast instead of running to GitHub's
    # 6h ceiling.
    timeout-minutes: 20
    needs: [lint-and-typecheck, test, build]
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-for-ci
      # The image already ships the matching browsers at this path; point
      # Playwright at them so it never tries to download into ~/.cache.
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci

      # Build once and serve the production server during the tests
      # (playwright.config.ts runs `npm run start` under CI). This avoids the
      # dev server's per-route on-demand compilation, which made every first
      # page navigation slow and flaky.
      - name: Build app
        run: npm run build

      - name: Run E2E tests
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

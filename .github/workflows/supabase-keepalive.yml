name: Supabase Keepalive

on:
  schedule:
    # Every 3 days at 12:00 UTC. Well under Supabase's 7-day pause threshold,
    # so a single missed run cannot pause the project.
    - cron: "0 12 */3 * *"
  workflow_dispatch:

jobs:
  ping:
    name: Ping Supabase
    runs-on: ubuntu-latest
    steps:
      - name: Hit REST API
        env:
          SUPABASE_URL: https://yiqsazurvymvkpjntphl.supabase.co
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ANON_KEY}" ]; then
            echo "::error::SUPABASE_ANON_KEY repo secret is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          # Strip whitespace (including newlines pasted with the JWT) so we never
          # build a header with a stray \r or \n, which curl rejects with exit 43
          # ("Failed sending HTTP request") before we get any HTTP status back.
          key=$(printf '%s' "$SUPABASE_ANON_KEY" | tr -d '[:space:]')
          if [ -z "$key" ]; then
            echo "::error::SUPABASE_ANON_KEY contains only whitespace — re-paste the JWT into the repo secret."
            exit 1
          fi
          if ! printf '%s' "$key" | grep -Eq '^[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+$'; then
            echo "::error::SUPABASE_ANON_KEY does not look like a JWT (expected three dot-separated base64url parts). Check you pasted the anon key, not a URL or label."
            exit 1
          fi
          body=$(mktemp)
          curl_err=$(mktemp)
          # Query an upcoming liturgical day — a real DB read, not just the schema endpoint.
          # This ensures the Supabase project registers genuine database activity.
          set +e
          status=$(curl -sS -o "$body" -w "%{http_code}" \
            -H "apikey: $key" \
            -H "Authorization: Bearer $key" \
            -H "Accept: application/json" \
            "$SUPABASE_URL/rest/v1/liturgical_days?select=id,date,cw_name&order=date.asc&limit=1&date=gte.$(date -u +%Y-%m-%d)" 2>"$curl_err")
          curl_exit=$?
          set -e
          if [ "$curl_exit" -ne 0 ]; then
            echo "curl stderr:"
            cat "$curl_err"
            echo "::error::curl failed with exit $curl_exit before getting an HTTP response"
            exit 1
          fi
          echo "Supabase responded with HTTP $status"
          echo "Next upcoming service:"
          cat "$body"
          echo
          if [ "$status" != "200" ]; then
            echo "::error::Unexpected status $status — project may be paused, the anon key may be wrong/rotated, or the URL may be misconfigured"
            exit 1
          fi

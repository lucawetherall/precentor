<html>
  <body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 24px; color: #1a1a1a;">
    <h2>Reset Your Password</h2>
    <p>Follow this link to reset your password:</p>
    <p>
      <a href="{{ .SiteURL }}/auth/callback?token_hash={{ .TokenHash }}&type=recovery&next=/reset-password"
         style="display: inline-block; padding: 10px 20px; background-color: #1a1a1a; color: #ffffff; text-decoration: none;">
        Reset Password
      </a>
    </p>
    <p style="color: #666; font-size: 14px;">If you did not request a password reset, you can safely ignore this email.</p>
  </body>
</html>
